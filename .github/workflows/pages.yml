name: "📰 Publish Test Results to GitHub Pages"

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "scripts/07-generate-report.sh"
      - "scripts/08-build-pages.sh"
      - "scripts/templates/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: "🏗️ Build GitHub Pages"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📊 Generate benchmark Site"
        run: ./scripts/08-build-pages.sh

      - name:  "📦 Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: "🚀 Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "🌍Publish GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
